services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: checker_events
      POSTGRES_USER: checker
      POSTGRES_PASSWORD: checker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checker -d checker_events"]
      interval: 5s
      timeout: 5s
      retries: 10

  parser-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: "postgres://checker:checker@postgres:5432/checker_events?sslmode=disable"
      USE_BROWSER: "true"
      BROWSER_BIN: "/usr/bin/chromium-browser"
      BROWSER_TIMEOUT: "45s"
      PSQL_BIN: "/usr/bin/psql"

volumes:
  postgres_data:
